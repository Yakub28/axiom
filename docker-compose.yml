# Qdrant only. P1 scope: no other services.
services:
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: axiom-qdrant
    ports:
      - "6333:6333"   # REST + gRPC entry used by qdrant-client
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
